<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BoardLite — New post</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>BoardLite</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/search.html">Search</a>
        <a href="/post.html">New post</a>
        <a href="/login.html">Login</a>
        <a href="/admin.html">Admin</a>
        <a href="/files.html">Files</a>
        <a href="/prefs.html">Preferences</a>
        <a href="/formula.html">Formula</a>
        <a href="/preview.html">URL preview</a>
        <a href="/status.html">Status</a>
      </nav>
    </header>
    <main>
      <section class="panel">
        <h2>Create a post</h2>
        <form id="post-form">
          <label for="author">Author</label>
          <input id="author" name="author" type="text" required />
          <label for="body">Message</label>
          <textarea id="body" name="body" rows="4" required></textarea>
          <button type="submit">Publish</button>
        </form>
        <h3>Preview response</h3>
        <pre id="post-result" class="result"></pre>
      </section>
      <section class="panel">
        <h2>Profile bio preview</h2>
        <form method="GET" action="/api/bio">
          <label for="name">Display name</label>
          <input id="name" name="name" type="text" />
          <label for="bio">Bio HTML</label>
          <input id="bio" name="bio" type="text" />
          <button type="submit">Render bio</button>
        </form>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
