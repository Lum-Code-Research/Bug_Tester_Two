<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BoardLite — Status</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>BoardLite</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/search.html">Search</a>
        <a href="/post.html">New post</a>
        <a href="/login.html">Login</a>
        <a href="/admin.html">Admin</a>
        <a href="/files.html">Files</a>
        <a href="/prefs.html">Preferences</a>
        <a href="/formula.html">Formula</a>
        <a href="/preview.html">URL preview</a>
        <a href="/status.html">Status</a>
      </nav>
    </header>
    <main>
      <section class="panel">
        <h2>Service status</h2>
        <p class="muted">Loads configuration/status from the server.</p>
        <pre id="status" class="result">Loading…</pre>
      </section>
    </main>
    <script>
      fetch("/api/status")
        .then((r) => r.json())
        .then((data) => {
          document.getElementById("status").textContent = JSON.stringify(
            data,
            null,
            2,
          );
        });
    </script>
  </body>
</html>
