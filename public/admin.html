<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BoardLite — Admin</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>BoardLite</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/search.html">Search</a>
        <a href="/post.html">New post</a>
        <a href="/login.html">Login</a>
        <a href="/admin.html">Admin</a>
        <a href="/files.html">Files</a>
        <a href="/prefs.html">Preferences</a>
        <a href="/formula.html">Formula</a>
        <a href="/preview.html">URL preview</a>
        <a href="/status.html">Status</a>
      </nav>
    </header>
    <main>
      <section class="panel">
        <h2>Search application logs</h2>
        <form method="GET" action="/api/logs/search">
          <label for="q">Pattern</label>
          <input id="q" name="q" type="text" />
          <button type="submit">Search logs</button>
        </form>
      </section>
      <section class="panel">
        <h2>Run report</h2>
        <form method="GET" action="/api/reports/run">
          <label for="name">Report name</label>
          <select id="name" name="name">
            <option value="summary">summary</option>
            <option value="activity">activity</option>
            <option value="errors">errors</option>
          </select>
          <button type="submit">Run</button>
        </form>
      </section>
    </main>
  </body>
</html>
