<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BoardLite — Files</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <h1>BoardLite</h1>
      <nav>
        <a href="/">Home</a>
        <a href="/search.html">Search</a>
        <a href="/post.html">New post</a>
        <a href="/login.html">Login</a>
        <a href="/admin.html">Admin</a>
        <a href="/files.html">Files</a>
        <a href="/prefs.html">Preferences</a>
        <a href="/formula.html">Formula</a>
        <a href="/preview.html">URL preview</a>
        <a href="/status.html">Status</a>
      </nav>
    </header>
    <main>
      <section class="panel">
        <h2>View uploaded file</h2>
        <form method="GET" action="/api/files/upload">
          <label for="file">Filename</label>
          <input id="file" name="file" type="text" placeholder="notes.txt" />
          <button type="submit">Open</button>
        </form>
      </section>
      <section class="panel">
        <h2>Public asset</h2>
        <form method="GET" action="/api/files/public">
          <label for="path">Asset path</label>
          <input id="path" name="path" type="text" placeholder="help.txt" />
          <button type="submit">Open</button>
        </form>
      </section>
    </main>
  </body>
</html>
