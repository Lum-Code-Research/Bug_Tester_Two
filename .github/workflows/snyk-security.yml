# Snyk Security
#
# Runs Snyk Code (SAST), Open Source (SCA), and IaC checks in parallel.
# Requires repository secret: SNYK_TOKEN
# Docs: https://github.com/snyk/actions

name: Snyk Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: snyk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Parallel security scans ----------
  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Code
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Continue so SARIF can still upload when findings are present
        run: snyk code test --sarif > snyk-code.sarif || true

      - name: Upload Snyk Code results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

  snyk-open-source:
    name: Snyk Open Source (SCA)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Monitor Open Source dependencies
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --all-projects

      - name: Test Open Source dependencies
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # Report vulnerabilities without failing the whole workflow for demo use
        run: snyk test --all-projects || true

  snyk-iac:
    name: Snyk IaC
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Snyk CLI
        uses: snyk/actions/setup@806182742461562b67788a64410098c9d9b96adb
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk IaC
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # IaC may find nothing / no config yet; keep reporting soft for this repo
        run: snyk iac test --report || true

  # ---------- Optional sequential gate ----------
  # Waits for all parallel Snyk jobs. Flip this on if you want a single
  # required check that only passes when every scan finishes.
  snyk-complete:
    name: Snyk scans complete
    runs-on: ubuntu-latest
    needs: [snyk-code, snyk-open-source, snyk-iac]
    if: always()
    steps:
      - name: Summarize parallel scan results
        run: |
          echo "Snyk Code: ${{ needs.snyk-code.result }}"
          echo "Snyk Open Source: ${{ needs.snyk-open-source.result }}"
          echo "Snyk IaC: ${{ needs.snyk-iac.result }}"
          if [ "${{ needs.snyk-code.result }}" != "success" ] || \
             [ "${{ needs.snyk-open-source.result }}" != "success" ] || \
             [ "${{ needs.snyk-iac.result }}" != "success" ]; then
            echo "One or more Snyk jobs failed."
            exit 1
          fi
          echo "All Snyk scans finished successfully."
